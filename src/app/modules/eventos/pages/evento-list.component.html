<div class="evento-list-container">
  <div style="display:flex; justify-content:space-between; align-items:center; gap:1rem; flex-wrap:wrap;">
    <h1>Eventos Disponibles</h1>
    <div style="display:flex; gap:1rem; flex-wrap:wrap;">
      <a mat-raised-button color="primary" routerLink="/eventos/crear">+ Crear Evento</a>
      <a mat-raised-button color="accent" routerLink="/reservas">Ver reservas</a>
    </div>
  </div>

  @if (loading()) {
    <div class="loading-spinner">
      <mat-spinner></mat-spinner>
    </div>
  }

  @if (!loading() && eventos().length === 0) {
    <div class="empty-state">
      <p>No hay eventos disponibles en este momento.</p>
    </div>
  }

  @if (!loading() && eventos().length > 0) {
    <div class="eventos-grid">
      @for (evento of eventos(); track evento.id) {
        <app-evento-card [evento]="evento"></app-evento-card>
      }
    </div>
  }
</div>
