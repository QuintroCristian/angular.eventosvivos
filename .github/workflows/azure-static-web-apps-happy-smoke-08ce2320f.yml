name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
          
      # --- 1. PASOS PARA COMPILAR MANUALMENTE ---
      - name: Configurar Node.js correcto
        uses: actions/setup-node@v4
        with:
          node-version: '24.15.0'

      - name: Instalar y construir Angular
        run: |
            npm install
            npm run build:dllo
      # ------------------------------------------
            
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_HAPPY_SMOKE_08CE2320F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations ######
          # --- 2. RUTAS ACTUALIZADAS PARA NO DEPENDER DE AZURE ---
          app_location: "dist/angular.eventosvivos/browser" # Ruta de la app ya compilada
          api_location: "" 
          output_location: "" # Se deja vacío
          skip_app_build: true # Ordena a Azure subir los archivos sin compilar
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_HAPPY_SMOKE_08CE2320F }}
          action: "close"
